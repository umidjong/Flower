<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disconnecting...</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.4; }
            100% { transform: translateY(-105vh) rotate(360deg); opacity: 0; }
        }
        @keyframes scan {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(300%); }
        }
        .animate-scan { animation: scan 8s linear infinite; }
        .cyber-particle { animation: floatUp linear forwards; }
        
        /* Chiroyli skrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: rgba(15, 23, 42, 0.5); }
        ::-webkit-scrollbar-thumb { background: rgba(16, 185, 129, 0.3); border-radius: 4px; }
    </style>
</head>
<body class="relative min-h-screen bg-slate-950 text-emerald-400 font-mono flex flex-col items-center justify-center overflow-hidden p-4 md:p-6 select-none">

    <div class="absolute inset-0 bg-[linear-gradient(to_right,#0f172a_1px,transparent_1px),linear-gradient(to_bottom,#0f172a_1px,transparent_1px)] bg-[size:4rem_4rem] opacity-40"></div>
    <div class="absolute inset-0 pointer-events-none bg-gradient-to-b from-transparent via-emerald-500/5 to-transparent h-1/3 w-full animate-scan"></div>

    <div id="particles-container" class="absolute inset-0 pointer-events-none"></div>

    <div class="relative z-10 max-w-2xl w-full bg-slate-900/90 border border-emerald-500/30 rounded-lg p-5 backdrop-blur-md shadow-[0_0_40px_rgba(16,185,129,0.15)] flex flex-col max-h-[85vh]">
        <div class="flex items-center gap-2 border-b border-slate-800 pb-3 mb-4 flex-shrink-0">
            <div class="w-3 h-3 rounded-full bg-red-500/80"></div>
            <div class="w-3 h-3 rounded-full bg-yellow-500/80"></div>
            <div class="w-3 h-3 rounded-full bg-emerald-500/80"></div>
            <span class="text-xs text-slate-500 ml-2">session_termination.log</span>
        </div>

        <div id="terminal-body" class="leading-relaxed text-sm md:text-base text-slate-300 overflow-y-auto pr-2 flex-grow">
            <span class="text-emerald-500 font-bold">$ run goodbye_protocol.sh</span> <br />
            <span class="text-slate-500" id="timestamp"></span> <br /><br />
            <span id="typing-text"></span><span class="animate-pulse font-bold text-emerald-400">|</span>
        </div>
    </div>

    <div class="absolute bottom-4 left-4 text-[10px] text-slate-600 z-0">
        SECURE_CONNECTION_CLOSED // AUTH_REVOKED
    </div>

    <script>
        document.getElementById('timestamp').innerText = "[" + new Date().toLocaleTimeString() + "] Status: Disconnecting...";

        const paragraphs = [
            "Siz bilan gaplashib, bir-birimizni tushunishga harakat qilib ko‘rdik, lekin fe’l-atvorimiz va dunyoqarashimiz umuman mos kelmasligini bildim. Hozirdan o‘rtamizda shunchalik tushunmovchilik va og‘ir urushlar bo‘layotgan ekan, keyinchalik birga hayot qurganimizda ham tinchlik bo‘lishiga hech kim kafolat berolmaydi. Men kelajakda bunday asabbuzar ko‘ngilsizliklar bilan yashashni xohlamayman.",
            "Oxirgi bo‘lgan gap-so‘zlardan keyin o‘rtamizda hech qanday iliqlik qolmadi, qaytib yarasha olmayman. Sovchi jo‘natish niyatimdan ham butunlay qaytdim.",
            "Sizdan iltimos, mendan keyin umidvor bo‘lib meni kutmang. Bir-birimizni ortiqcha bezovta qilmaylik va vaqtimizni ketkazmaylik. Yo‘limiz ham, taqdirimiz ham mutlaqo boshqa. Hayotda o‘zingizga mos, sizni tushunadigan insonni topishingizni tilayman.",
            "Mendan zarracha umidvor bo‘lmang, yo‘limni kutmang. Meni qaytarishga yoki tushuntirishga urinib o‘zingizni ham, meni ham bezovta qilmang.",
            "Biz uchun eng yaxshisi — bir-birimizga begona bo‘lib qolish.",
            "Sizga tilagim: doimo ota-onangizning aytganini qilib, gaplariga quloq soling, ularning yuzini yorug‘ qiladigan soliha qiz bo‘ling. Hayotda to‘xtab qolmay, shaxsiy rivojlanishingiz, o‘qish va maqsadlaringiz ustida ishlang. Va eng muhimi — har qanday vaziyatda ham qalbingizdagi iymoningizni yo‘qotmang. Doimo o‘zingizni ehtiyot qiling.",
            "Biz uchun eng yaxshisi — bir-birimizga begona bo‘lib qolish. Taqdiringiz mendan xayrli va go‘zal bo‘lsin..............!!!"
        ];

        let pIndex = 0;
        let cIndex = 0;
        const typingText = document.getElementById('typing-text');
        const terminalBody = document.getElementById('terminal-body');

        function type() {
            if (pIndex < paragraphs.length) {
                let currentText = paragraphs[pIndex];
                if (cIndex < currentText.length) {
                    typingText.innerHTML += currentText.charAt(cIndex);
                    cIndex++;
                    terminalBody.scrollTop = terminalBody.scrollHeight;
                    setTimeout(type, 75); 
                } else {
                    typingText.innerHTML += "<br><br>";
                    pIndex++;
                    cIndex = 0;
                    setTimeout(type, 800); 
                }
            }
        }
        setTimeout(type, 1500);

        // Kiber-elementlar (Yuraklar va Raqamlar) generatori
        const container = document.getElementById('particles-container');
        
        // Ranglar va neon effektlar ro'yxati
        const styles = [
            { text: '❤️', color: '#ef4444', glow: 'rgba(239, 68, 68, 0.6)' },   // Qizil yurak
            { text: '🖤', color: '#1e293b', glow: 'rgba(255, 255, 255, 0.1)' }, // Qora yurak
            { text: '🤍', color: '#f8fafc', glow: 'rgba(255, 255, 255, 0.6)' }, // Oq yurak
            { text: '💚', color: '#10b981', glow: 'rgba(16, 185, 129, 0.6)' }, // Yashil yurak
            { text: '0', color: '#10b981', glow: 'rgba(16, 185, 129, 0.4)' },  // Kiber 0 raqami
            { text: '1', color: '#10b981', glow: 'rgba(16, 185, 129, 0.4)' }   // Kiber 1 raqami
        ];

        setInterval(() => {
            const particle = document.createElement('span');
            // Tasodifiy elementni tanlash (yurak yoki raqam)
            const randomStyle = styles[Math.floor(Math.random() * styles.length)];
            
            particle.className = 'absolute bottom-[-30px] font-bold cyber-particle';
            particle.innerText = randomStyle.text;
            particle.style.color = randomStyle.color;
            particle.style.left = Math.random() * 100 + '%';
            
            // O'lchami va tezligi tasodifiy bo'ladi
            const size = Math.random() * 20 + 14;
            particle.style.fontSize = size + 'px';
            
            const duration = Math.random() * 5 + 4;
            particle.style.animationDuration = duration + 's';
            
            // Neon porlash effekti
            particle.style.textShadow = `0 0 10px ${randomStyle.glow}`;
            
            container.appendChild(particle);
            // Ekrandan chiqib ketgach o'chirib tashlash (xotira to'lib qolmasligi uchun)
            setTimeout(() => particle.remove(), duration * 1000);
        }, 350); // Chiqish chastotasi biroz tezlashtirildi
    </script>
</body>
</html>
